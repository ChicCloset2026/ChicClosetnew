<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favorites</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>
<div class="navbar">
  <a href="home.html" class="logo">
    <img src="images/logo.png" alt="ChicCloset Logo">
  </a>
  <ul class="nav-icons-links">
    <li><a href="home.html"><i class="fa-solid fa-house"></i> Home</a></li>
    <li><a href="home.html#shopNow"><i class="fa-solid fa-store"></i> Shop Now</a></li>
    <li><a href="home.html#policies"><i class="fa-solid fa-file-lines"></i> Policies</a></li>
    <li><a href="favorites_page.html"><i class="fa-solid fa-heart"></i> Wishlist</a></li>
    <li class="cart-item-nav">
      <a href="cart.html" class="cart-link">
        <i class="fa-solid fa-bag-shopping"></i> Cart
        <span id="cart-count">0</span>
      </a>
    </li>
    <li><a href="login.html" id="login-link"><i class="fa-solid fa-user"></i> Login</a></li>
    <li><button id="logout-btn" onclick="logout()">Logout</button></li>
  </ul>
</div>
<div class="page-title">Your Favorite Outfits ❤️</div>

<div class="wishlist-products" id="favoritesContainer">
  </div>

<footer class="footer">
  <div class="footer-section">
    <h2>About Us</h2>
    <p>ChicCloset provides ready-made coordinated outfits for every occasion.</p>
  </div>

  <div class="footer-section">
    <h2>Customer Service</h2>
    <p>Email: <a href="mailto:support@chiccloset.com">support@chiccloset.com</a></p>
    <p>Phone: <a href="tel:+9665XXXXXXXX">+966 543145036</a></p>
  </div>

  <div class="footer-section">
    <h2>Follow Us</h2>
    <ul>
      <li><a href="https://www.instagram.com/chiccloset_0166">Instagram</a></li>
      <li><a href="https://x.com/ChicClosethrcp">X</a></li>
      <li><a href="https://www.tiktok.com/@chiccloset448">TikTok</a></li>
    </ul>
  </div>
</footer>

<script>
  // ================== Navbar ==================

// Update the navbar based on the login status
function updateNavbar() {

  // Retrieve the currently logged-in user from localStorage
  const user = JSON.parse(localStorage.getItem("currentUser"));

  // Select the login link and logout button from the page
  const loginLink = document.getElementById("login-link");
  const logoutBtn = document.getElementById("logout-btn");

  // If a user is logged in
  if (user) {

    // Extract the username from the email (text before @)
    const username = user.email.split("@")[0];

    // Replace the Login text with the username and user icon
    loginLink.innerHTML = `
      <i class="fa-solid fa-user"></i> ${username}
    `;

    // Go to profile page
    loginLink.href = "profile.html";

    // Show the logout button
    logoutBtn.style.display = "block";

  } else {

    // If no user is logged in, show the default Login text
    loginLink.innerHTML = `
      <i class="fa-solid fa-user"></i> Login
    `;

    // Go to login page
    loginLink.href = "login.html";

    // Hide the logout button
    logoutBtn.style.display = "none";
  }
}

// Run the navbar update immediately when the page loads
updateNavbar();


// Log out the current user
function logout() {

  localStorage.removeItem("currentUser");

  alert("Logged out!");

  // Redirect the user to the home page
  window.location.href = "home.html";
}

// ===== Retrieve favorites from localStorage or create an empty array =====
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

// ===== Select the container where favorite products will be displayed =====
const container = document.getElementById("favoritesContainer");

// ===== Select the page title =====
const pageTitle = document.querySelector(".page-title");

// ===== Function to display favorite products on the page =====
function displayFavorites() {

  // Clear previous content before re-rendering
  container.innerHTML = "";

  // If there are no favorites
  if (favorites.length === 0) {

    // Hide the title
    pageTitle.style.display = "none";

    // Show empty message
    container.innerHTML = `<p class="empty">No favorites yet 💔</p>`;
    return;
  }

  // If there are favorite products, show the title
  pageTitle.style.display = "block";

  // Loop through each favorite product and display it
  favorites.forEach((product, index) => {

    // Add one product card to the container
    container.innerHTML += `
      <div class="card">

        <!-- Link to the product details page -->
        <a href="${product.page}">
          <img src="${product.image}" alt="${product.name}">
        </a>

        <!-- Product name -->
        <div class="card-name">${product.name}</div>

        <!-- Product price -->
        <div class="card-price">${product.price} SAR</div>

        <!-- Container for action buttons -->
        <div class="wishlist-buttons">

          <!-- Add to Cart button -->
          <a href="${product.page}" class="add-cart-btn">
            Add to Cart
          </a>

          <!-- Remove button -->
          <button class="remove-btn" onclick="removeFavorite(${index})">
            Remove
          </button>

        </div>

      </div>
    `;
  });
}


// ===== Function to remove a product from favorites =====
function removeFavorite(index) {

  // Remove the selected item from the favorites array
  favorites.splice(index, 1);

  // Save the updated favorites array to localStorage
  localStorage.setItem("favorites", JSON.stringify(favorites));

  // Re-display the updated favorites list
  displayFavorites();
}


// ===== Run display function only if the container exists =====
if (container) {
  displayFavorites();
}


// ================== Cart Count ==================

// Update the number shown on the cart icon in the navbar
function updateCartCount() {

  // Get the currently logged-in user
  const user = JSON.parse(localStorage.getItem("currentUser"));

  // Create an empty cart array
  let cart = [];

  // Load the user's cart if they are logged in
  if (user) {
    cart = JSON.parse(localStorage.getItem("cart_" + user.email)) || [];
  }

  // Calculate the total quantity of all cart items
  let totalQty = 0;

  cart.forEach(item => {
    totalQty += Number(item.quantity);
  });

  // Select the cart count element
  let count = document.getElementById("cart-count");

  // Update the displayed cart count if the element exists
  if (count) {
    count.textContent = totalQty;
  }
}

// Run the cart count update when the page loads
updateCartCount();

</script>
</body>
</html>
